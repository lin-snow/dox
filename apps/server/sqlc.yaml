version: "2"
sql:
  - engine: sqlite
    schema: internal/db/migrations
    queries: internal/db/queries
    gen:
      go:
        package: queries
        out: internal/db/queries
        emit_json_tags: false
        emit_interface: false
        emit_empty_slices: true
        overrides:
          # SQLite has no native bool; map INTEGER → bool.
          - column: "todos.done"
            go_type: "bool"
          - column: "projects.archived"
            go_type: "bool"
