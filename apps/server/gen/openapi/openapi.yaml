components:
    schemas:
        AcceptInviteRequest:
            type: object
            properties:
                code:
                    type: string
        AcceptInviteResponse:
            type: object
            properties:
                projectId:
                    type: string
                    description: |-
                        The project the caller joined; empty if the code was a server invite,
                         which AcceptInvite rejects (server invites are only redeemable via Register).
                role:
                    type: string
        CreateInviteRequest:
            type: object
            properties:
                projectId:
                    type: string
                    description: Unset = server-level invite (owner only). Set = project invite.
                role:
                    type: string
                    description: Required iff project_id is set. "editor" or "viewer".
                ttlMs:
                    type: string
                    description: Code lifetime in milliseconds. 0 → 24h.
        CreatePairingCodeRequest:
            type: object
            properties:
                deviceName:
                    type: string
                ttlMs:
                    type: string
                    description: Code lifetime in milliseconds. 0 → 60_000.
        CreatePairingCodeResponse:
            type: object
            properties:
                code:
                    type: string
                expiresAt:
                    type: string
        CreateProjectRequest:
            type: object
            properties:
                name:
                    type: string
                description:
                    type: string
                color:
                    type: string
        CreateTodoRequest:
            type: object
            properties:
                title:
                    type: string
                projectId:
                    type: string
                    description: Unset = create in Inbox (private to caller).
        DeleteProjectResponse:
            type: object
            properties: {}
        DeleteTodoResponse:
            type: object
            properties: {}
        DeleteUserResponse:
            type: object
            properties: {}
        Device:
