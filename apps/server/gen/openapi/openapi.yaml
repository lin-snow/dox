                registrationOpen:
                    type: boolean
                    description: |-
                        Mirrors the registration_open server setting. When true, Register works
                         without an invite code (only meaningful once has_users is true).
        ServerSettings:
            type: object
            properties:
                registrationOpen:
                    type: boolean
        Status:
            type: object
            properties:
                code:
                    type: integer
                    description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
                    format: int32
                message:
                    type: string
                    description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
                details:
                    type: array
                    items:
                        $ref: '#/components/schemas/GoogleProtobufAny'
                    description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
            description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
        Todo:
            type: object
            properties:
                id:
                    type: string
                    description: Server-generated ULID, primary key.
                title:
                    type: string
                    description: Human-readable title.
                done:
                    type: boolean
                    description: Whether the todo is marked done.
                createdAt:
                    type: string
                    description: Creation time, UTC unix milliseconds.
                updatedAt:
                    type: string
                    description: Last update time, UTC unix milliseconds.
                projectId:
                    type: string
                    description: Project the todo belongs to. Unset = Inbox (private to created_by).
                createdBy:
                    type: string
                    description: User who created the todo.
            description: Todo is a single todo item, owned by a user and optionally scoped to a project.
        UpdateProjectRequest:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                description:
                    type: string
