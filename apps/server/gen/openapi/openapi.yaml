tags:
    - name: AuthService
      description: |-
        AuthService hosts the public (unauthenticated) RPCs:
           - ServerInfo lets a client probe a server before logging in so the
             onboarding UI can pick the right branch (first-user / existing-user
             login / register-with-invite) and surface the server's identity.
           - Register creates a user. The first-ever Register on an empty server
             makes the caller the owner and may set the server's display
             name/description inline. Subsequent Registers require either a valid
             invite code or registration_open=true.
           - Login authenticates an existing user with username + password and
             returns a JWT.
    - name: InviteService
      description: |-
        InviteService issues and accepts invitation codes. A server invite
         (project_id unset) is owner-only and brings a new user onto the server via
         AuthService.Register. A project invite (project_id set) is project-owner-only
         and either brings a new user onto the server + into the project (via
         Register) or just adds an existing user to the project (via AcceptInvite).
    - name: ProjectService
      description: |-
        ProjectService manages projects. All mutations are owner-only; members can
         only read project metadata and (if editor) mutate todos within the project.
    - name: TodoService
      description: TodoService manages todos for the authenticated user.
    - name: UserService
      description: |-
        UserService covers user introspection, server-wide settings (owner-only),
         and the caller's own password management.
