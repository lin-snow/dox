                registrationOpen:
                    type: boolean
        UpdateTodoRequest:
            type: object
            properties:
                id:
                    type: string
                title:
                    type: string
                done:
                    type: boolean
        User:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                role:
                    type: string
                    description: '"owner" or "member".'
                createdAt:
                    type: string
tags:
    - name: AuthService
      description: |-
        AuthService hosts the public (unauthenticated) RPCs:
           - ServerInfo lets a client probe the server before logging in, so the
             onboarding UI can pick the right branch (first-user / open registration /
             invite-required) without exposing concepts to the user.
           - Register creates a user. The first-ever Register on an empty server makes
             the caller the owner. Subsequent Registers require either a valid invite
             code or registration_open=true.
           - RedeemPairingCode is for an existing user adding another device to their
             own account (no new user is created).
    - name: InviteService
      description: |-
        InviteService issues and accepts invitation codes. A server invite
         (project_id unset) is owner-only and brings a new user onto the server via
         AuthService.Register. A project invite (project_id set) is project-owner-only
         and either brings a new user onto the server + into the project (via
         Register) or just adds an existing user to the project (via AcceptInvite).
    - name: ProjectService
      description: |-
        ProjectService manages projects. All mutations are owner-only; members can
         only read project metadata and (if editor) mutate todos within the project.
    - name: TodoService
      description: TodoService manages todos for the authenticated user.
    - name: UserService
      description: |-
        UserService covers user introspection, server-wide settings (owner-only),
         and the caller's own device management.
