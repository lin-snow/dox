        CreateInviteRequest:
            type: object
            properties:
                projectId:
                    type: string
                    description: Unset = server-level invite (owner only). Set = project invite.
                role:
                    type: string
                    description: Required iff project_id is set. "editor" or "viewer".
                ttlMs:
                    type: string
                    description: Code lifetime in milliseconds. 0 → 24h.
        CreateProjectRequest:
            type: object
            properties:
                name:
                    type: string
                description:
                    type: string
                color:
                    type: string
        CreateTodoRequest:
            type: object
