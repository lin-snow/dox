syntax = "proto3";

package dox.v1;

import "google/api/annotations.proto";

option go_package = "github.com/lin-snow/dox/apps/server/gen/dox/v1;doxv1";

message Invite {
  // Plaintext code. Returned only when the invite is created; stored hashed.
  string code = 1;
  string issued_by = 2;
  // Empty for server-level invites.
  string project_id = 3;
  // Empty for server-level invites; otherwise "editor" or "viewer".
  string role = 4;
  int64 created_at = 5;
  int64 expires_at = 6;
}

// OutgoingInvite is a still-redeemable invite the caller issued. Used by the
// Settings → Invites list. The plaintext `code` is unrecoverable after creation
// (only the hash is stored), so listings carry `code_hash` as the opaque
// identifier the client uses to revoke a row.
message OutgoingInvite {
  // Server-internal identifier (sha256 hex). Pass back via RevokeInvite.
  string code_hash = 1;
  // Empty for server-level invites.
  string project_id = 2;
  // Resolved by the server; empty for server-level invites or if the project
  // was deleted out from under the invite.
  string project_name = 3;
  // Empty for server-level invites; otherwise "editor" or "viewer".
  string role = 4;
  int64 created_at = 5;
  int64 expires_at = 6;
}

// InviteService issues and accepts invitation codes. A server invite
// (project_id unset) is owner-only and brings a new user onto the server via
// AuthService.Register. A project invite (project_id set) is project-owner-only
// and either brings a new user onto the server + into the project (via
// Register) or just adds an existing user to the project (via AcceptInvite).
service InviteService {
  rpc CreateInvite(CreateInviteRequest) returns (Invite) {
    option (google.api.http) = {
      post: "/v1/invites"
      body: "*"
    };
  }

  rpc AcceptInvite(AcceptInviteRequest) returns (AcceptInviteResponse) {
    option (google.api.http) = {
      post: "/v1/invites/accept"
      body: "*"
    };
  }

  // Lists the caller's own still-redeemable invites. Owner sees both server
  // and project invites they issued; non-owner project owners see only their
  // project invites.
  rpc ListOutgoingInvites(ListOutgoingInvitesRequest) returns (ListOutgoingInvitesResponse) {
    option (google.api.http) = {get: "/v1/invites/outgoing"};
  }

  // Hard-deletes one of the caller's own outgoing invites. Code becomes
  // invalid immediately.
  rpc RevokeInvite(RevokeInviteRequest) returns (RevokeInviteResponse) {
    option (google.api.http) = {delete: "/v1/invites/{code_hash}"};
  }
}

message CreateInviteRequest {
  // Unset = server-level invite (owner only). Set = project invite.
  optional string project_id = 1;
  // Required iff project_id is set. "editor" or "viewer".
  optional string role = 2;
  // Code lifetime in milliseconds. 0 → 24h.
  int64 ttl_ms = 3;
}

message AcceptInviteRequest {
  string code = 1;
}

message AcceptInviteResponse {
  // The project the caller joined; empty if the code was a server invite,
  // which AcceptInvite rejects (server invites are only redeemable via Register).
  string project_id = 1;
  string role = 2;
}

message ListOutgoingInvitesRequest {}

message ListOutgoingInvitesResponse {
  repeated OutgoingInvite invites = 1;
}

message RevokeInviteRequest {
  // The opaque server-internal identifier returned by ListOutgoingInvites.
  string code_hash = 1;
}

message RevokeInviteResponse {}
