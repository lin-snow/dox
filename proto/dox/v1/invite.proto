syntax = "proto3";

package dox.v1;

import "google/api/annotations.proto";

option go_package = "github.com/lin-snow/dox/apps/server/gen/dox/v1;doxv1";

message Invite {
  // Plaintext code. Returned only when the invite is created; stored hashed.
  string code = 1;
  string issued_by = 2;
  // Empty for server-level invites.
  string project_id = 3;
  // Empty for server-level invites; otherwise "editor" or "viewer".
  string role = 4;
  int64 created_at = 5;
  int64 expires_at = 6;
}

// InviteService issues and accepts invitation codes. A server invite
// (project_id unset) is owner-only and brings a new user onto the server via
// AuthService.Register. A project invite (project_id set) is project-owner-only
// and either brings a new user onto the server + into the project (via
// Register) or just adds an existing user to the project (via AcceptInvite).
service InviteService {
  rpc CreateInvite(CreateInviteRequest) returns (Invite) {
    option (google.api.http) = {
      post: "/v1/invites"
      body: "*"
    };
  }

  rpc AcceptInvite(AcceptInviteRequest) returns (AcceptInviteResponse) {
    option (google.api.http) = {
      post: "/v1/invites/accept"
      body: "*"
    };
  }
}

message CreateInviteRequest {
  // Unset = server-level invite (owner only). Set = project invite.
  optional string project_id = 1;
  // Required iff project_id is set. "editor" or "viewer".
  optional string role = 2;
  // Code lifetime in milliseconds. 0 → 24h.
  int64 ttl_ms = 3;
}

message AcceptInviteRequest {
  string code = 1;
}

message AcceptInviteResponse {
  // The project the caller joined; empty if the code was a server invite,
  // which AcceptInvite rejects (server invites are only redeemable via Register).
  string project_id = 1;
  string role = 2;
}
