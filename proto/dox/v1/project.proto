syntax = "proto3";

package dox.v1;

import "google/api/annotations.proto";

option go_package = "github.com/lin-snow/dox/apps/server/gen/dox/v1;doxv1";

message Project {
  string id = 1;
  string owner_id = 2;
  string name = 3;
  string description = 4;
  string color = 5;
  bool archived = 6;
  int32 sort_order = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message ProjectMember {
  string user_id = 1;
  // "editor" or "viewer".
  string role = 2;
  int64 added_at = 3;
}

// ProjectService manages projects. All mutations are owner-only; members can
// only read project metadata and (if editor) mutate todos within the project.
service ProjectService {
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse) {
    option (google.api.http) = {get: "/v1/projects"};
  }

  rpc GetProject(GetProjectRequest) returns (Project) {
    option (google.api.http) = {get: "/v1/projects/{id}"};
  }

  rpc CreateProject(CreateProjectRequest) returns (Project) {
    option (google.api.http) = {
      post: "/v1/projects"
      body: "*"
    };
  }

  rpc UpdateProject(UpdateProjectRequest) returns (Project) {
    option (google.api.http) = {
      patch: "/v1/projects/{id}"
      body: "*"
    };
  }

  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse) {
    option (google.api.http) = {delete: "/v1/projects/{id}"};
  }

  rpc ListProjectMembers(ListProjectMembersRequest) returns (ListProjectMembersResponse) {
    option (google.api.http) = {get: "/v1/projects/{project_id}/members"};
  }

  rpc RemoveProjectMember(RemoveProjectMemberRequest) returns (RemoveProjectMemberResponse) {
    option (google.api.http) = {delete: "/v1/projects/{project_id}/members/{user_id}"};
  }
}

message ListProjectsRequest {}
message ListProjectsResponse {
  repeated Project projects = 1;
}

message GetProjectRequest {
  string id = 1;
}

message CreateProjectRequest {
  string name = 1;
  optional string description = 2;
  optional string color = 3;
}

message UpdateProjectRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string color = 4;
  optional bool archived = 5;
  optional int32 sort_order = 6;
}

message DeleteProjectRequest {
  string id = 1;
}
message DeleteProjectResponse {}

message ListProjectMembersRequest {
  string project_id = 1;
}
message ListProjectMembersResponse {
  repeated ProjectMember members = 1;
}

message RemoveProjectMemberRequest {
  string project_id = 1;
  string user_id = 2;
}
message RemoveProjectMemberResponse {}
