syntax = "proto3";

package dox.v1;

import "google/api/annotations.proto";

option go_package = "github.com/lin-snow/dox/apps/server/gen/dox/v1;doxv1";

// Todo is a single todo item, owned by a user and optionally scoped to a project.
message Todo {
  // Server-generated ULID, primary key.
  string id = 1;
  // Human-readable title.
  string title = 2;
  // Whether the todo is marked done.
  bool done = 3;
  // Creation time, UTC unix milliseconds.
  int64 created_at = 4;
  // Last update time, UTC unix milliseconds.
  int64 updated_at = 5;
  // Project the todo belongs to. Unset = Inbox (private to created_by).
  optional string project_id = 6;
  // User who created the todo.
  string created_by = 7;
}

// TodoService manages todos for the authenticated user.
service TodoService {
  // ListTodos returns todos visible to the caller. With no project_id filter
  // it returns the caller's Inbox plus every project they own or are a member
  // of. project_id == "inbox" filters to Inbox only.
  rpc ListTodos(ListTodosRequest) returns (ListTodosResponse) {
    option (google.api.http) = {get: "/v1/todos"};
  }

  rpc GetTodo(GetTodoRequest) returns (Todo) {
    option (google.api.http) = {get: "/v1/todos/{id}"};
  }

  rpc CreateTodo(CreateTodoRequest) returns (Todo) {
    option (google.api.http) = {
      post: "/v1/todos"
      body: "*"
    };
  }

  rpc UpdateTodo(UpdateTodoRequest) returns (Todo) {
    option (google.api.http) = {
      patch: "/v1/todos/{id}"
      body: "*"
    };
  }

  rpc DeleteTodo(DeleteTodoRequest) returns (DeleteTodoResponse) {
    option (google.api.http) = {delete: "/v1/todos/{id}"};
  }
}

message ListTodosRequest {
  // Filter the listing. Unset = everything visible to caller. "inbox" = Inbox
  // only. A project id = that project only (caller must be owner or member).
  optional string project_id = 1;
}

message ListTodosResponse {
  repeated Todo todos = 1;
}

message GetTodoRequest {
  string id = 1;
}

message CreateTodoRequest {
  string title = 1;
  // Unset = create in Inbox (private to caller).
  optional string project_id = 2;
}

message UpdateTodoRequest {
  string id = 1;
  optional string title = 2;
  optional bool done = 3;
}

message DeleteTodoRequest {
  string id = 1;
}

message DeleteTodoResponse {}
