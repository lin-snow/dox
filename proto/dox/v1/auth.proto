syntax = "proto3";

package dox.v1;

import "google/api/annotations.proto";

option go_package = "github.com/lin-snow/dox/apps/server/gen/dox/v1;doxv1";

// AuthService hosts the public (unauthenticated) RPCs:
//   - ServerInfo lets a client probe the server before logging in, so the
//     onboarding UI can pick the right branch (first-user / open registration /
//     invite-required) without exposing concepts to the user.
//   - Register creates a user. The first-ever Register on an empty server makes
//     the caller the owner. Subsequent Registers require either a valid invite
//     code or registration_open=true.
//   - RedeemPairingCode is for an existing user adding another device to their
//     own account (no new user is created).
service AuthService {
  rpc ServerInfo(ServerInfoRequest) returns (ServerInfoResponse) {
    option (google.api.http) = {get: "/v1/auth/server-info"};
  }

  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }

  rpc RedeemPairingCode(RedeemPairingCodeRequest) returns (RedeemPairingCodeResponse) {
    option (google.api.http) = {
      post: "/v1/auth/redeem"
      body: "*"
    };
  }
}

message ServerInfoRequest {}
message ServerInfoResponse {
  // True once the server has at least one registered user. When false, the next
  // Register call promotes the caller to owner regardless of invite/registration
  // policy.
  bool has_users = 1;
  // Mirrors the registration_open server setting. When true, Register works
  // without an invite code (only meaningful once has_users is true).
  bool registration_open = 2;
  // Server build identity, surfaced unauthenticated so a CLI can warn on
  // CLI/server version skew before login.
  string version = 3;
  // Short commit sha for the running server build. May carry a "-dirty"
  // suffix for local builds.
  string commit = 4;
}

message RegisterRequest {
  // Display name for the new user. Must be unique across the server.
  string user_name = 1;
  // Name for the first device (e.g. "laptop", "phone").
  string device_name = 2;
  // Required when registration is closed and the users table is non-empty.
  optional string invite_code = 3;
}

message RegisterResponse {
  string token = 1;
  string user_id = 2;
  string user_name = 3;
  string role = 4;
  string device_id = 5;
  string device_name = 6;
}

message RedeemPairingCodeRequest {
  string code = 1;
}

message RedeemPairingCodeResponse {
  string token = 1;
  string device_id = 2;
  string device_name = 3;
  string user_id = 4;
  string user_name = 5;
}
