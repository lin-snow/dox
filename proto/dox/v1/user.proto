syntax = "proto3";

package dox.v1;

import "google/api/annotations.proto";

option go_package = "github.com/lin-snow/dox/apps/server/gen/dox/v1;doxv1";

message User {
  string id = 1;
  string name = 2;
  // "owner" or "member".
  string role = 3;
  int64 created_at = 4;
}

message ServerSettings {
  bool registration_open = 1;
  string server_name = 2;
  string server_description = 3;
}

// UserService covers user introspection, server-wide settings (owner-only),
// and the caller's own password management.
service UserService {
  rpc GetMe(GetMeRequest) returns (User) {
    option (google.api.http) = {get: "/v1/me"};
  }

  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {
    option (google.api.http) = {
      post: "/v1/me/password"
      body: "*"
    };
  }

  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {get: "/v1/users"};
  }

  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (google.api.http) = {delete: "/v1/users/{id}"};
  }

  // Owner-only. Resets a user's password to a fresh one-time temp password
  // (returned in the response) — owner relays it out-of-band; the user is
  // expected to ChangePassword on first login.
  rpc ResetUserPassword(ResetUserPasswordRequest) returns (ResetUserPasswordResponse) {
    option (google.api.http) = {
      post: "/v1/users/{user_id}/reset-password"
      body: "*"
    };
  }

  rpc GetServerSettings(GetServerSettingsRequest) returns (ServerSettings) {
    option (google.api.http) = {get: "/v1/settings"};
  }

  rpc UpdateServerSettings(UpdateServerSettingsRequest) returns (ServerSettings) {
    option (google.api.http) = {
      patch: "/v1/settings"
      body: "*"
    };
  }
}

message GetMeRequest {}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}
message ChangePasswordResponse {}

message ListUsersRequest {}
message ListUsersResponse {
  repeated User users = 1;
}

message DeleteUserRequest {
  string id = 1;
}
message DeleteUserResponse {}

message ResetUserPasswordRequest {
  string user_id = 1;
}
message ResetUserPasswordResponse {
  // Plaintext one-time temp password. Owner must relay to the user; the
  // user should ChangePassword on first login.
  string temp_password = 1;
}

message GetServerSettingsRequest {}

message UpdateServerSettingsRequest {
  optional bool registration_open = 1;
  optional string server_name = 2;
  optional string server_description = 3;
}
