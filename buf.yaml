version: v2
modules:
  - path: proto
deps:
  - buf.build/googleapis/googleapis
lint:
  use:
    - STANDARD
  except:
    # Allow `Todo` as response for Get/Create/Update — wrapping in
    # `<Rpc>Response` adds ergonomic friction for a personal-scope API.
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
